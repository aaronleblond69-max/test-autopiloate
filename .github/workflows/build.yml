name: Build Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Build
      run: msbuild RevolutionlessAutopilot.csproj /p:Configuration=Release /p:Platform=AnyCPU
      working-directory: .

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: RevolutionlessAutopilot
        path: bin/Release/RevolutionlessAutopilot.dll
