name: Build Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: microsoft/setup-msbuild@v2
    - name: Build
      run: msbuild RevolutionlessAutopilot.csproj /p:Configuration=Release /p:Platform=AnyCPU
    - uses: actions/upload-artifact@v4
      with:
        name: RevolutionlessAutopilot
        path: bin/Release/RevolutionlessAutopilot.dll
        
